name: SonarQube Backend Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonar-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend and generate JaCoCo report
        run: mvn -B -f backend/pom.xml clean verify

      - name: Check JaCoCo report
        run: |
          ls -la backend/target/site/jacoco || true
          test -f backend/target/site/jacoco/jacoco.xml

      - name: Analyze backend with SonarQube Cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B -f backend/pom.xml sonar:sonar
          -Dsonar.projectKey=BugBoard26-backend
          -Dsonar.organization=enzop6
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
