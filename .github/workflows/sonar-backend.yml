name: SonarQube Backend Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonar-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and analyze backend
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean verify sonar:sonar -Dsonar.projectKey=BugBoard26 -Dsonar.organization=enzop6 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN
